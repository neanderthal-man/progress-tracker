<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reflection</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;color:#2e3b53}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;outline:none}
#appbar{background:#ffffff;height:58px;display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:50;border-bottom:1px solid #d1d8e3}
#logo{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,0.12)}
#appname{font-weight:600;font-size:15px;color:#1f2937;white-space:nowrap}
#bar-div{width:1px;height:20px;background:#d4d9e1}
nav{display:flex;gap:2px;flex:1}
nav button{padding:6px 14px;font-size:13px;border-radius:6px;border:none;background:transparent;color:#475569;font-weight:400;transition:all 0.15s}
nav button.active{background:#eff2f7;color:#1e293b;font-weight:500}
#addtaskbtn{padding:7px 16px;font-size:13px;border-radius:8px;border:none;background:#0064f7;color:#fff;font-weight:500;white-space:nowrap;box-shadow:0 2px 6px rgba(0,100,247,0.24)}
#content{padding:20px 24px;max-width:1200px;margin:0 auto}
h2{font-size:17px;font-weight:600;margin-bottom:2px;color:#0f172a}
h3{font-size:14px;font-weight:600;color:#334155}
.sub{font-size:13px;color:#475569}
.progwrap{background:#e2e8f0;border-radius:4px;height:5px;overflow:hidden;margin:10px 0 16px}
.progbar{height:100%;border-radius:4px;background:linear-gradient(90deg,#10b981,#22c55e);transition:width 0.5s}
#kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.col{background:#ffffff;border-radius:12px;padding:12px;border:1px solid #d2d6e3}
.col-head{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid #e4e7ef}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#0f62fe}
.col-title{font-size:13px;font-weight:600;color:#1f2937;flex:1}
.col-count{font-size:11px;font-weight:500;background:#f8fafc;border:1px solid #d6dbe7;border-radius:20px;padding:1px 8px;color:#475569}
.col-empty{text-align:center;padding:20px 0;color:#64748b;font-size:13px}
.card{background:#ffffff;border:1px solid #d2d6e3;border-radius:10px;padding:12px 13px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px;border-left-width:3px;border-left-color:#0f62fe}
.card.overdue{border-left-color:#ef4444}
.card-title{font-size:13px;font-weight:500;line-height:1.45;flex:1;color:#111827}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500}
.card-timer{font-size:11px;color:#334155;display:flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums}
.card-timer.running{color:#7ecbff}
.card-timer.paused{color:#f9d868}
.tdot{width:5px;height:5px;border-radius:50%;display:inline-block}
.card-actions{margin-top:auto;display:flex;gap:6px;flex-wrap:wrap}
.cbtn{font-size:12px;padding:5px 12px;border-radius:7px;font-weight:600;border:1px solid #cfd8e8;background:#ffffff;color:#1f2937;box-shadow:0 1px 2px rgba(15,23,42,0.08)}
.card-menu{background:none;border:none;color:#4a5e80;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0}
.card-row{display:flex;align-items:flex-start;gap:6px}
.bl-row{background:#f8fafc;border:1px solid #d8e1ef;border-radius:10px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border-left-width:3px;border-left-color:#0f62fe}
.bl-main{flex:1;min-width:0}
.bl-title{font-size:13px;font-weight:500;color:#0f172a}
.bl-notes{font-size:12px;color:#475569;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.move-btn{font-size:12px;padding:6px 13px;border-radius:7px;font-weight:600;white-space:nowrap;flex-shrink:0;border:1px solid #bfd0e7;background:#eff6ff;color:#1e3a8a;transition:all 0.2s}
.move-btn:hover{background:#dbeafb;border-color:#9fbce0}
.card-menu{background:none;border:none;color:#3f4f68;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#ffffff;border:1px solid #dee3ec;border-radius:12px;padding:16px 18px;border-top-width:3px;border-top-color:#0f62fe}
.stat-label{font-size:12px;color:#64748b;margin-bottom:6px;font-weight:500}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:3px;color:#102a43}
.stat-sub{font-size:11px;color:#607d98}
.chart-wrap{background:#ffffff;border:1px solid #dee3ec;border-radius:12px;padding:20px 24px;margin-bottom:16px}
.chart-row{margin-bottom:14px}
.chart-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.chart-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#334e68}
.chart-sqdot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.chart-right{display:flex;gap:14px;align-items:center}
.chart-pct{font-size:12px;font-weight:600;min-width:32px;text-align:right;color:#1f2937}
.chart-bar-bg{background:#e4e7ef;border-radius:4px;height:8px;overflow:hidden}
.chart-bar{height:100%;border-radius:4px;transition:width 0.5s}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mini-card{background:#ffffff;border-radius:9px;padding:12px 14px;border:1px solid #d8e1ef}
.mini-label{font-size:11px;color:#64748b;margin-bottom:3px}
.mini-val{font-size:20px;font-weight:700;color:#102a43}
#overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.15);z-index:200;align-items:center;justify-content:center;padding:16px}
#overlay.show{display:flex}
.modal{background:#ffffff;border-radius:14px;overflow:hidden;width:100%;max-width:480px;box-shadow:0 8px 22px rgba(15,23,42,0.22);border:1px solid #d1d6e3}
.modal-head{padding:16px 20px 12px;border-bottom:1px solid #e5e8ef;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.modal-title{font-weight:600;font-size:15px;line-height:1.4;flex:1;color:#0f172a}
.modal-close{background:none;border:none;color:#64748b;font-size:22px;line-height:1;padding:0}
.modal-body{padding:18px 24px 24px;max-height:80vh;overflow-y:auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:#475569;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 11px;border-radius:8px;border:1px solid #d1d6e3;background:#ffffff;color:#1f2937}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.modal-foot{display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-top:1px solid #e5e8ef;padding-top:14px;margin-top:14px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.detail-timer{background:#f8fafc;border-radius:9px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;border:1px solid #d6dbe4}
.tval{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:#102a43}
.sep{width:1px;height:18px;background:#d6dbe4;flex-shrink:0}
.b-pri{font-size:13px;padding:8px 16px;border-radius:8px;border:none;background:#0058d5;color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(0,88,213,0.32)}
.b-sec{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #cfd8e3;background:#f8fbff;color:#102a43;font-weight:600}
.b-green{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #34d399;background:#dcfce7;color:#065f46;font-weight:600}
.b-yellow{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #facc15;background:#fef9c3;color:#78350f;font-weight:600}
.b-red{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #fca5a5;background:#fee2e2;color:#991b1b;font-weight:600;margin-left:auto}
.b-sm{font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid #d8e1ef;background:#f8fafc;color:#475569;font-weight:600}
.empty-bl{text-align:center;padding:48px;color:#64748b;font-size:14px;background:#f8fafc;border-radius:12px;border:1px solid #d6dbe4}
</style>
</head>
<body>

<div id="appbar">
  <div id="logo">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="34" height="34" rx="10" fill="url(#lg)"/>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#312e81"/>
          <stop offset="100%" stop-color="#1e40af"/>
        </linearGradient>
      </defs>
      <!-- open book -->
      <path d="M17 10 C17 10 11 11 9 13.5 L9 25 C11 22.5 17 22 17 22" stroke="#a5b4fc" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M17 10 C17 10 23 11 25 13.5 L25 25 C23 22.5 17 22 17 22" stroke="#a5b4fc" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <line x1="17" y1="10" x2="17" y2="22" stroke="#818cf8" stroke-width="1.4" stroke-linecap="round"/>
      <!-- subtle arc above = reflection -->
      <path d="M13 8.5 Q17 6 21 8.5" stroke="#c7d2fe" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.7"/>
    </svg>
  </div>
  <span id="appname">Reflection</span>
  <div id="bar-div"></div>
  <nav>
    <button class="active" onclick="setView('today')">Today</button>
    <button onclick="setView('week')">This Week</button>
    <button onclick="setView('backlog')">Backlog</button>
    <button onclick="setView('analytics')">Analytics</button>
  </nav>
  <button id="addtaskbtn" onclick="openAddModal()">+ Add Task</button>
</div>

<div id="content">
  <div style="text-align:center;padding:80px 0;color:#334155;font-size:14px">Loading your data…</div>
</div>

<div id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title" id="modal-title-text"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const JSONBIN_KEY = "$2a$10$8ZG02F4sQO8ZvWhP1m1Ehu0z4bUYyypEr7SfAaFkHauMCc7GlR1hC";
const JSONBIN_BIN = "69bd8541aa77b81da9027889";

// ── SUBJECTS ──────────────────────────────────────────────────────────────────
const SUBJECTS = [
  {id:"prelims", label:"Prelims GS",                    color:"#1d4ed8", bg:"#dbeafe"},
  {id:"gs1",     label:"GS-I · History, Society & Geo", color:"#065f46", bg:"#d1fae5"},
  {id:"gs2",     label:"GS-II · Polity & Governance",   color:"#0e7490", bg:"#cffafe"},
  {id:"gs3",     label:"GS-III · Economy, Env & Tech",  color:"#6d28d9", bg:"#ede9fe"},
  {id:"gs4",     label:"GS-IV · Ethics & Integrity",    color:"#92400e", bg:"#fef3c7"},
  {id:"anthro1", label:"Anthropology Paper-I",          color:"#9d174d", bg:"#fce7f3"},
  {id:"anthro2", label:"Anthropology Paper-II",         color:"#be123c", bg:"#ffe4e6"},
  {id:"ca",      label:"Current Affairs",               color:"#b91c1c", bg:"#fee2e2"},
  {id:"essay",   label:"Essay",                         color:"#374151", bg:"#f3f4f6"},
  {id:"csat",    label:"CSAT",                          color:"#5b21b6", bg:"#f3e8ff"},
];
const subMap = Object.fromEntries(SUBJECTS.map(s => [s.id, s]));

const PSTYLES = {
  High:   {bg:"#fee2e2", color:"#b91c1c", dot:"#ef4444"},
  Medium: {bg:"#fef3c7", color:"#92400e", dot:"#f59e0b"},
  Low:    {bg:"#dcfce7", color:"#166534", dot:"#22c55e"},
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function uid()        { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function pad2(v){return String(v).padStart(2,'0');}
function todayStr()   { const dt = new Date(); return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`; }
function getMonthStr(){ const dt = new Date(); return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}`; }
function getMon(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const offset = (day + 6) % 7; // 0=Monday, 1=Tuesday,...6=Sunday
  dt.setDate(dt.getDate() - offset);
  return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
}
function fmtDate(d)   { return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short"}); }
function weekLabel(m) { const s=new Date(m); s.setDate(s.getDate()+6); return fmtDate(m)+" – "+fmtDate(s); }
function fmtTime(s)   { if(!s||s<0)return"0s"; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return h>0?h+"h "+m+"m":m>0?m+"m "+sc+"s":sc+"s"; }

function elapsed(t) {
  const base = t.elapsed || 0;
  if (t.status === "inprogress" && !t.paused && t.startedAt)
    return base + Math.floor((Date.now() - t.startedAt) / 1000);
  return base;
}

// ── JSONBIN ───────────────────────────────────────────────────────────────────
function jbHeaders() {
  return {"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY,"X-Bin-Versioning":"false"};
}

async function jbLoad() {
  const res = await fetch("https://api.jsonbin.io/v3/b/"+JSONBIN_BIN+"/latest", {headers:jbHeaders()});
  if (!res.ok) throw new Error("Load failed "+res.status);
  const j = await res.json();
  return j.record.tasks || [];
}

async function jbSave(ts) {
  setSyncStatus("saving","● saving…");
  const res = await fetch("https://api.jsonbin.io/v3/b/"+JSONBIN_BIN, {
    method:"PUT", headers:jbHeaders(),
    body: JSON.stringify({tasks:ts})
  });
  if (!res.ok) { setSyncStatus("error","● save failed"); return; }
  setSyncStatus("synced","● synced");
}

function setSyncStatus(cls, text) {} // removed from UI, kept to avoid call errors


function scheduleSave() { jbSave(tasks).catch(()=>{}); }

// ── SEED ──────────────────────────────────────────────────────────────────────
function seedData() {
  const today = todayStr(), mon = getMon(new Date());
  return [
    {id:uid(),title:"Ancient History – Indus Valley",subject:"prelims",priority:"High",dueDate:today,status:"planned",scope:"daily",weekStart:mon,notes:"Economy & social structure",elapsed:0,startedAt:null,paused:false,completedAt:null,createdAt:today},
    {id:uid(),title:"Ethics – Aptitude & Foundational Values",subject:"gs4",priority:"Medium",dueDate:today,status:"planned",scope:"daily",weekStart:mon,notes:"Lexicon Ch.1",elapsed:0,startedAt:null,paused:false,completedAt:null,createdAt:today},
    {id:uid(),title:"Economy – Monetary Policy basics",subject:"gs3",priority:"Low",dueDate:"",status:"planned",scope:"backlog",weekStart:"",notes:"Ramesh Singh Ch.7",elapsed:0,startedAt:null,paused:false,completedAt:null,createdAt:today},
  ];
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let tasks = [], currentView = "today", timerInterval = null;

function setView(v) {
  currentView = v;
  document.querySelectorAll("nav button").forEach((b,i) => {
    b.classList.toggle("active", ["today","week","backlog","analytics"][i] === v);
  });
  render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (tasks.some(t => t.status === "inprogress" && !t.paused)) render();
  }, 1000);
}

// ── TASK OPS ──────────────────────────────────────────────────────────────────
function startTask(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = "inprogress"; t.startedAt = Date.now(); t.paused = false;
  scheduleSave(); render();
}
function pauseTask(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.elapsed = elapsed(t); t.startedAt = null; t.paused = true;
  scheduleSave(); render();
}
function resumeTask(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.startedAt = Date.now(); t.paused = false;
  scheduleSave(); render();
}
function completeTask(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.elapsed = elapsed(t); t.startedAt = null; t.paused = false;
  t.status = "completed"; t.completedAt = new Date().toISOString();
  scheduleSave(); render(); closeModal();
}
function reopenTask(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = "planned"; t.startedAt = null; t.paused = false;
  scheduleSave(); render(); closeModal();
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  scheduleSave(); render(); closeModal();
}
function moveTask(id, scope) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  const today = todayStr(), mon = getMon(new Date());
  if (scope === "daily")       { t.scope="daily";   t.dueDate=today; t.weekStart=mon; t.status="planned"; }
  else if (scope === "weekly") { t.scope="weekly";  t.weekStart=mon; t.dueDate="";   t.status="planned"; }
  else                         { t.scope="backlog"; t.dueDate="";   t.weekStart="";  t.status="planned"; }
  scheduleSave(); render(); closeModal();
}
function updateNotes(id, val) {
  const t = tasks.find(x => x.id === id); if (t) { t.notes = val; scheduleSave(); }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const today = todayStr(), monday = getMon(new Date()), month = getMonthStr();
  const c = document.getElementById("content");
  if      (currentView === "today")     c.innerHTML = renderKanban(tasks.filter(t => t.scope==="daily" && t.dueDate===today), "Today · "+fmtDate(new Date()));
  else if (currentView === "week")      c.innerHTML = renderKanban(tasks.filter(t => (t.scope==="weekly"||t.scope==="daily") && t.weekStart===monday), "This Week · "+weekLabel(monday));
  else if (currentView === "backlog")   c.innerHTML = renderBacklog(tasks.filter(t => t.scope==="backlog"));
  else if (currentView === "analytics") c.innerHTML = renderAnalytics(today, monday, month);
}

// ── KANBAN ────────────────────────────────────────────────────────────────────
function renderKanban(ts, label) {
  const done = ts.filter(t => t.status==="completed").length, total = ts.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const cols = [
    {id:"planned",    title:"Planned",     accent:"red"},
    {id:"inprogress", title:"In Progress", accent:"orange"},
    {id:"completed",  title:"Completed",   accent:"#22c55e"},
  ];
  let html = `<h2>${label}</h2><p class="sub">${done}/${total} tasks completed</p>
    <div class="progwrap"><div class="progbar" style="width:${pct}%"></div></div>
    <div id="kanban">`;
  cols.forEach(col => {
    const ct = ts.filter(t => t.status === col.id);
    html += `<div class="col">
      <div class="col-head">
        <span class="col-dot" style="background:${col.accent}"></span>
        <span class="col-title">${col.title}</span>
        <span class="col-count">${ct.length}</span>
      </div>`;
    if (ct.length === 0) html += `<div class="col-empty">No tasks</div>`;
    ct.forEach(t => { html += renderCard(t); });
    html += `</div>`;
  });
  return html + `</div>`;
}

// ── TASK CARD ─────────────────────────────────────────────────────────────────
function renderCard(t) {
  const sub = subMap[t.subject] || {};
  const pc  = PSTYLES[t.priority] || {};
  const e   = elapsed(t);
  const overdue  = t.dueDate && t.dueDate < todayStr() && t.status !== "completed";
  const isRun    = t.status === "inprogress" && !t.paused;
  const isPaused = t.status === "inprogress" && t.paused;

  let actions = "";
  if (t.status === "planned") {
    actions = `<button class="cbtn" style="border-color:#8fb5ff;background:#ffffff;color:#0f172a" onclick="startTask('${t.id}')">▶ Start</button>`;
  } else if (isRun) {
    actions = `<button class="cbtn" style="border-color:#fbbf24;background:#fef3c7;color:#92400e" onclick="pauseTask('${t.id}')">⏸ Pause</button>
               <button class="cbtn" style="border-color:#16a34a;background:#dcfce7;color:#065f46" onclick="completeTask('${t.id}')">✓ Done</button>`;
  } else if (isPaused) {
    actions = `<button class="cbtn" style="border-color:#8fb5ff;background:#eff6ff;color:#1e3a8a" onclick="resumeTask('${t.id}')">▶ Resume</button>
               <button class="cbtn" style="border-color:#16a34a;background:#dcfce7;color:#065f46" onclick="completeTask('${t.id}')">✓ Done</button>`;
  } else {
    actions = `<button class="cbtn" style="border-color:#94a3b8;background:#f8fafc;color:#334155" onclick="reopenTask('${t.id}')">↩ Reopen</button>`;
  }

  const timerCls  = isRun ? "running" : isPaused ? "paused" : "";
  const dotColor  = isRun ? "#60a5fa" : "#fbbf24";
  const timerNote = isRun ? " · recording" : isPaused ? " · paused" : "";

  return `<div class="card${overdue?" overdue":""}" style="border-left-color:${sub.color||'#243452'}">
    <div class="card-row">
      <span class="card-title">${t.title}</span>
      <button class="card-menu" onclick="openDetailModal('${t.id}')">⋯</button>
    </div>
    <div class="card-tags">
      <span class="tag" style="background:${sub.bg};color:${sub.color}">${sub.label||""}</span>
      <span class="tag" style="background:${pc.bg};color:${pc.color}">
        <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${pc.dot};margin-right:3px;vertical-align:middle"></span>${t.priority}
      </span>
      ${t.dueDate?`<span class="tag" style="background:${overdue?"#fee2e2":"#e2e8f0"};color:${overdue?"#991b1b":"#334155"}">${overdue?"Overdue":fmtDate(t.dueDate)}</span>`:""}
    </div>
    <div class="card-timer ${timerCls}">
      ${(isRun||isPaused)?`<span class="tdot" style="background:${dotColor}"></span>`:""}
      ${fmtTime(e)}${timerNote}
    </div>
    <div class="card-actions">${actions}</div>
  </div>`;
}

// ── BACKLOG ───────────────────────────────────────────────────────────────────
function renderBacklog(ts) {
  let html = `<div style="margin-bottom:16px"><h2>Backlog</h2><p class="sub">${ts.length} tasks parked</p></div>`;
  if (ts.length === 0) return html + `<div class="empty-bl">Backlog is empty — great job!</div>`;
  const grouped = {};
  ts.forEach(t => { grouped[t.subject] = grouped[t.subject] || []; grouped[t.subject].push(t); });
  Object.entries(grouped).forEach(([subId, arr]) => {
    const sub = subMap[subId] || {};
    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
        <span style="width:9px;height:9px;border-radius:3px;background:${sub.color};display:inline-block"></span>
        <span style="font-size:13px;font-weight:600;color:#94a3b8">${sub.label}</span>
        <span style="font-size:12px;color:#475569">(${arr.length})</span>
      </div>`;
    arr.forEach(t => {
      const pc = PSTYLES[t.priority] || {};
      html += `<div class="bl-row" style="border-left-color:${sub.color}">
        <div class="bl-main">
          <div class="bl-title">${t.title}</div>
          ${t.notes?`<div class="bl-notes">${t.notes}</div>`:""}
        </div>
        <span class="tag" style="background:${pc.bg};color:${pc.color};flex-shrink:0">${t.priority}</span>
        <button class="move-btn" style="border-color:#8fb5ff;background:#eff6ff;color:#1e3a8a" onclick="moveTask('${t.id}','daily')">→ Today</button>
        <button class="move-btn" style="border-color:#b3c7e3;background:#f1f5f9;color:#1e3a8a" onclick="moveTask('${t.id}','weekly')">→ Week</button>
        <button class="card-menu" onclick="openDetailModal('${t.id}')">⋯</button>
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function renderAnalytics(today, monday, month) {
  const completed   = tasks.filter(t => t.status === "completed");
  const dailyTime   = tasks.filter(t => t.dueDate===today||t.createdAt===today).reduce((s,t)=>s+elapsed(t),0);
  const weeklyTime  = tasks.filter(t => t.weekStart===monday).reduce((s,t)=>s+elapsed(t),0);
  const monthlyTime = tasks.filter(t => t.createdAt&&t.createdAt.slice(0,7)===month).reduce((s,t)=>s+elapsed(t),0);
  const totalTime   = tasks.reduce((s,t) => s+elapsed(t), 0);
  const todayDone   = completed.filter(t => t.completedAt&&t.completedAt.slice(0,10)===today).length;
  const weekDone    = completed.filter(t => t.completedAt&&t.completedAt.slice(0,10)>=monday).length;
  const monthDone   = completed.filter(t => t.completedAt&&t.completedAt.slice(0,7)===month).length;

  const tStats = [
    {label:"Today's Study",    val:fmtTime(dailyTime),   sub:todayDone+" tasks done",       accent:"#3b82f6"},
    {label:"This Week",        val:fmtTime(weeklyTime),  sub:weekDone+" tasks done",         accent:"#8b5cf6"},
    {label:"This Month",       val:fmtTime(monthlyTime), sub:monthDone+" tasks done",        accent:"#0d9488"},
    {label:"Total Study Time", val:fmtTime(totalTime),   sub:completed.length+" total done", accent:"#f59e0b"},
  ];

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2>Analytics & Study Hours</h2>
    <button class="b-sm" onclick="exportBackup()">⬇ Export Backup</button>
  </div><div class="stat-grid">`;
  tStats.forEach(s => {
    html += `<div class="stat-card" style="border-top-color:${s.accent}">
      <div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div><div class="stat-sub">${s.sub}</div>
    </div>`;
  });
  html += `</div>`;

  const bySub = {};
  SUBJECTS.forEach(s => { bySub[s.id] = {total:0,done:0,time:0}; });
  tasks.forEach(t => {
    if (!bySub[t.subject]) bySub[t.subject] = {total:0,done:0,time:0};
    bySub[t.subject].total++;
    if (t.status === "completed") bySub[t.subject].done++;
    bySub[t.subject].time += elapsed(t);
  });
  const chartData = SUBJECTS.map(s => ({...s,...bySub[s.id]})).filter(s => s.total > 0).sort((a,b) => b.time-a.time);
  const maxTime = Math.max(...chartData.map(s => s.time), 1);

  html += `<div class="chart-wrap"><h3 style="margin-bottom:4px">Time spent by subject</h3>
    <p style="font-size:12px;color:#475569;margin-bottom:16px">How you are spending your study hours</p>`;
  if (!chartData.length) html += `<div style="color:#334155;font-size:13px">No study time recorded yet.</div>`;
  chartData.forEach(s => {
    const pct   = Math.round(s.time/maxTime*100);
    const share = totalTime > 0 ? Math.round(s.time/totalTime*100) : 0;
    html += `<div class="chart-row">
      <div class="chart-meta">
        <div class="chart-name"><span class="chart-sqdot" style="background:${s.color}"></span>${s.label}</div>
        <div class="chart-right">
          <span style="font-size:12px;color:#475569">${s.done}/${s.total}</span>
          <span style="font-size:12px;color:#64748b;min-width:40px;text-align:right">${fmtTime(s.time)}</span>
          <span class="chart-pct" style="color:${s.color}">${share}%</span>
        </div>
      </div>
      <div class="chart-bar-bg"><div class="chart-bar" style="width:${pct}%;background:${s.color}"></div></div>
    </div>`;
  });
  html += `</div>`;

  const total = tasks.length, comp = completed.length;
  const mini = [
    {label:"Total Tasks",    val:total},
    {label:"Completed",      val:comp},
    {label:"In Progress",    val:tasks.filter(t=>t.status==="inprogress").length},
    {label:"Planned",        val:tasks.filter(t=>t.status==="planned").length},
    {label:"Backlog",        val:tasks.filter(t=>t.scope==="backlog").length},
    {label:"Completion Rate",val:(total>0?Math.round(comp/total*100):0)+"%"},
  ];
  html += `<div class="chart-wrap"><h3 style="margin-bottom:14px">Overall task completion</h3><div class="mini-grid">`;
  mini.forEach(s => { html += `<div class="mini-card"><div class="mini-label">${s.label}</div><div class="mini-val">${s.val}</div></div>`; });
  return html + `</div></div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(title, body) {
  document.getElementById("modal-title-text").textContent = title;
  document.getElementById("modal-body").innerHTML = body;
  document.getElementById("overlay").classList.add("show");
}
function closeModal() { document.getElementById("overlay").classList.remove("show"); }

function openAddModal() {
  const today = todayStr();
  const sd = currentView==="week"?"weekly":currentView==="backlog"?"backlog":"daily";
  const subOpts = SUBJECTS.map(s => `<option value="${s.id}">${s.label}</option>`).join("");
  openModal("Add new task", `
    <div class="field"><label>Task title *</label>
      <input id="f-title" placeholder="e.g. Polity – Fundamental Rights" style="width:100%"/></div>
    <div class="grid2">
      <div class="field"><label>Subject</label><select id="f-subject">${subOpts}</select></div>
      <div class="field"><label>Priority</label>
        <select id="f-priority">
          <option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option>
        </select></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Add to</label>
        <select id="f-scope" onchange="toggleDueDate()">
          <option value="daily"${sd==="daily"?" selected":""}>Today (+ This Week)</option>
          <option value="weekly"${sd==="weekly"?" selected":""}>This Week only</option>
          <option value="backlog"${sd==="backlog"?" selected":""}>Backlog</option>
        </select></div>
      <div class="field" id="f-due-wrap" style="${sd!=="daily"?"display:none":""}">
        <label>Due date</label><input type="date" id="f-due" value="${today}" style="width:100%"/></div>
    </div>
    <div class="field"><label>Notes</label>
      <textarea id="f-notes" rows="2" placeholder="Optional…" style="width:100%;height:60px"></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
      <button class="b-sec" onclick="closeModal()">Cancel</button>
      <button class="b-pri" onclick="saveNewTask()">Add Task</button>
    </div>`);
  setTimeout(() => document.getElementById("f-title").focus(), 50);
}

function toggleDueDate() {
  document.getElementById("f-due-wrap").style.display =
    document.getElementById("f-scope").value === "daily" ? "" : "none";
}

function saveNewTask() {
  const title = document.getElementById("f-title").value.trim();
  if (!title) { alert("Please enter a task title."); return; }
  const scope = document.getElementById("f-scope").value;
  const today = todayStr(), mon = getMon(new Date());
  tasks.push({
    id: uid(), title,
    subject:   document.getElementById("f-subject").value,
    priority:  document.getElementById("f-priority").value,
    scope, status:"planned",
    dueDate:   scope==="daily" ? document.getElementById("f-due").value : "",
    weekStart: scope==="daily"||scope==="weekly" ? mon : "",
    notes:     document.getElementById("f-notes").value,
    elapsed:0, startedAt:null, paused:false, completedAt:null, createdAt:today,
  });
  scheduleSave(); closeModal(); render();
}

function openDetailModal(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  const sub    = subMap[t.subject] || {};
  const pc     = PSTYLES[t.priority] || {};
  const e      = elapsed(t);
  const isRun  = t.status === "inprogress" && !t.paused;
  const isPaused = t.status === "inprogress" && t.paused;

  let ab = "";
  if (t.status === "planned")  ab = `<button class="b-pri" onclick="startTask('${t.id}');closeModal()">▶ Start</button>`;
  else if (isRun)              ab = `<button class="b-yellow" onclick="pauseTask('${t.id}');closeModal()">⏸ Pause</button>
                                      <button class="b-green" onclick="completeTask('${t.id}')">✓ Complete</button>`;
  else if (isPaused)           ab = `<button class="b-pri" onclick="resumeTask('${t.id}');closeModal()">▶ Resume</button>
                                      <button class="b-green" onclick="completeTask('${t.id}')">✓ Complete</button>`;
  else                         ab = `<button class="b-sec" onclick="reopenTask('${t.id}')">↩ Reopen</button>`;

  let mb = "";
  if (t.scope !== "daily")   mb += `<button class="b-sec" onclick="moveTask('${t.id}','daily')">→ Today</button>`;
  if (t.scope !== "weekly")  mb += `<button class="b-sec" onclick="moveTask('${t.id}','weekly')">→ Week</button>`;
  if (t.scope !== "backlog") mb += `<button class="b-sec" onclick="moveTask('${t.id}','backlog')">→ Backlog</button>`;

  const timerNote = isRun ? '<span style="font-size:12px;color:#60a5fa;margin-left:auto">● recording</span>'
                  : isPaused ? '<span style="font-size:12px;color:#fbbf24;margin-left:auto">⏸ paused</span>' : "";

  openModal(t.title, `
    <div class="detail-tags">
      <span class="tag" style="background:${sub.bg};color:${sub.color}">${sub.label||""}</span>
      <span class="tag" style="background:${pc.bg};color:${pc.color}">${t.priority}</span>
      <span class="tag" style="background:#1e2d45;color:#64748b">${t.scope==="daily"?"Today":t.scope==="weekly"?"This Week":"Backlog"}</span>
      ${t.dueDate?`<span class="tag" style="background:#1e2d45;color:#64748b">Due ${fmtDate(t.dueDate)}</span>`:""}
    </div>
    <div class="detail-timer">
      <span style="font-size:13px;color:#64748b">Study time</span>
      <span class="tval">${fmtTime(e)}</span>
      ${timerNote}
    </div>
    <div class="field"><label>Notes</label>
      <textarea rows="3" style="width:100%;height:72px" onchange="updateNotes('${t.id}',this.value)">${t.notes||""}</textarea></div>
    <div class="modal-foot">
      ${ab}<div class="sep"></div>${mb}
      <button class="b-red" onclick="deleteTask('${t.id}')">Delete</button>
    </div>`);
}

function exportBackup() {
  const blob = new Blob([JSON.stringify({tasks,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "upsc-backup-"+todayStr()+".json";
  a.click();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key === "n") { e.preventDefault(); openAddModal(); }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
jbLoad()
  .then(t => { tasks = t.length ? t : seedData(); render(); startTimer(); setSyncStatus("synced","● synced"); })
  .catch(() => { setSyncStatus("error","● offline"); document.getElementById("content").innerHTML = `<div style="text-align:center;padding:80px 0;color:#f87171;font-size:14px">Could not load data. Check your internet connection and refresh.</div>`; });
</script>
</body>
</html>
